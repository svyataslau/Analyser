<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/analyser.css">
  <title>CYBER PARTY</title>
</head>
<body>
  <div class="start-overlay" id="start-overlay">
    <div class="start-overlay__bg"></div>
    <img class="start-overlay__cursor" id="start-cursor-img" src="assets/cursor.png" alt="" aria-hidden="true">
    <button type="button" class="start-screen" id="experience-start">Start</button>
    <div class="start-overlay__footer" aria-hidden="true">
      <span class="start-overlay__powered-label">Powered by</span>
      <span class="start-overlay__brand">
        <img class="start-overlay__brand-logo" src="assets/logo.png" alt="ANTIDOT logo">
        ShinobiX
      </span>
    </div>
  </div>
  <header class="site-header" role="banner">
    <span class="site-header__spacer" aria-hidden="true"></span>
    <h1 class="site-header__title">CYBER PARTY</h1>
    <div class="site-header__actions">
      <button type="button" class="player__fullscreen-btn" id="fullscreen-enter">Fullscreen &amp; Dance</button>
    </div>
  </header>
  <div class="player">
    <div class="player-layout">
    <div class="player-layout__main">
    <div class="player__spectrum-shell" id="spectrum-fullscreen-root">
      <div class="player__spectrum-toolbar">
        <button type="button" class="player__fullscreen-btn" id="customize-dancers-fs-btn" hidden>Customize Dancers</button>
        <button type="button" class="player__fullscreen-btn" id="fullscreen-exit" hidden>Exit fullscreen</button>
      </div>
      <canvas id="spectrum-canvas" class="spectrum-canvas" width="800" height="450"></canvas>
      <div class="fs-controls" id="fs-controls">
        <button type="button" id="fs-play-btn" class="fs-play-btn">&#9654; Play</button>
        <button type="button" id="club-btn" class="fs-play-btn fs-play-btn--club">CLUB</button>
      </div>
    </div>

    <section class="player__section">
      <div class="player__music-row">
        <div class="player__banger-stack">
          <div class="player__banger-upload" id="upload-trigger" role="button" tabindex="0" aria-label="Upload Banger">
            <span class="player__banger-upload-text">Upload Banger</span>
            <input type="file" id="track-file-input" name="track-file-input" accept=".mp3,audio/mpeg" hidden>
          </div>
          <select id="library-track-select" class="player__track-picker player__track-picker--banger" aria-label="Select track"></select>
        </div>
        <figure class="player__album player__album--placeholder" id="track-album">
          <img id="track-cover-art" class="player__album-img" alt="">
        </figure>
        <div class="player__bg-stack">
          <div class="player__bg-wrap">
            <div class="player__bg-upload" id="bg-upload-trigger" role="button" tabindex="0" aria-label="Upload Background">
              <span class="player__bg-upload-text">Upload Background</span>
              <input type="file" id="bg-file-input" accept="image/*" hidden>
            </div>
            <button type="button" class="player__bg-remove" id="bg-remove-btn" hidden aria-label="Remove background">&times;</button>
          </div>
          <button type="button" class="player__bg-upload" id="customize-dancers-btn">
            <span class="player__bg-upload-text">Customize Dancers</span>
          </button>
        </div>
      </div>
      <div class="player__panel player__track-row">
        <audio id="spectrum-audio" class="player__audio" crossorigin="anonymous" draggable="false"></audio>
        <div class="audio-ctrl" id="audio-ctrl">
          <button class="audio-ctrl__play" id="audio-play-btn" type="button" aria-label="Play">PLAY</button>
          <button class="audio-ctrl__play audio-ctrl__club" id="normal-club-btn" type="button" aria-label="Club mode">CLUB</button>
          <span class="audio-ctrl__time" id="audio-current-time">0:00</span>
          <div class="audio-ctrl__seek" id="audio-seek" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0" aria-label="Seek">
            <div class="audio-ctrl__seek-fill" id="audio-seek-fill"></div>
            <div class="audio-ctrl__seek-thumb" id="audio-seek-thumb"></div>
          </div>
          <span class="audio-ctrl__time" id="audio-total-time">0:00</span>
          <label class="audio-ctrl__vol-label" for="audio-volume">VOL</label>
          <input class="audio-ctrl__volume" id="audio-volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
        </div>
      </div>
    </section>

    <div class="player__panel player__panel--sliders">
      <div class="player__slider-row">
        <label for="grid-density-range" class="player__label">Grid columns</label>
        <div class="player__slider-line">
          <input type="range" id="grid-density-range" class="player__slider" min="10" max="100" step="1" value="20">
        </div>
      </div>
      <div class="player__slider-row">
        <label class="player__label">Gradient colors</label>
        <div class="player__color-row" id="gradient-color-row">
          <button type="button" class="player__color-add-btn" id="gradient-add-color" title="Add color">+</button>
        </div>
      </div>
    </div>
    </div>
    <aside class="player-queue" id="player-queue" aria-label="Playback queue">
      <div class="player-queue__block">
        <div class="player-queue__label">NOW</div>
        <div class="player-queue__now" id="queue-now">
          <div class="player-queue__now-track" id="queue-now-inner"></div>
        </div>
      </div>
      <div class="player-queue__block">
        <div class="player-queue__label">NEXT</div>
        <ul class="player-queue__next" id="queue-next-list"></ul>
      </div>
      <div class="player-queue__repeat-wrap">
        <button type="button" class="player-queue__repeat-btn" id="queue-repeat-btn" aria-label="Repeat mode">Repeat · Off</button>
      </div>
      <div class="player-queue__add">
        <label class="player-queue__upload" role="button" tabindex="0">
          <span class="player-queue__upload-text">Upload Banger</span>
          <input type="file" id="queue-file-input" accept=".mp3,audio/mpeg" hidden>
        </label>
        <div class="player-queue__add-row">
          <select id="queue-add-select" class="player-queue__add-select" aria-label="Add library track to queue"></select>
          <button type="button" class="player-queue__add-btn" id="queue-add-btn">Add</button>
        </div>
      </div>
    </aside>
    </div>
  </div>
  <script src="js/analyser.js"></script>
</body>
</html>
