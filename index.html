<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/analyser.css">
  <title>Cyber Party</title>
</head>
<body>
  <button type="button" class="start-screen" id="experience-start">Start</button>
  <header class="site-header">
    <h1 class="site-header__title">CYBER PARTY</h1>
  </header>
  <div class="player">
    <canvas id="spectrum-canvas" class="spectrum-canvas" width="800" height="450"></canvas>
    <div class="player__panel player__panel--upload" id="upload-trigger" role="button" tabindex="0">
      <label for="track-file-input" class="player__label">Upload your track</label>
      <input type="file" id="track-file-input" name="track-file-input" accept=".mp3,audio/mpeg" hidden>
    </div>
    <div class="player__panel player__track-row">
      <label for="library-track-select" class="player__label">Library</label>
      <select id="library-track-select" class="player__track-picker" aria-label="Built-in track"></select>
    </div>
    <div class="player__panel">
      <div class="player__grid-fields">
        <input class="player__field-dimension" type="number" id="grid-columns-input" value="20" min="10" max="100" inputmode="numeric" onkeypress="isInputNumber(event)" onkeyup="isFromTo(this)">
        <span class="player__field-separator">×</span>
        <input class="player__field-dimension" type="number" id="grid-rows-input" value="10" min="10" max="100" inputmode="numeric" onkeypress="isInputNumber(event)" onkeyup="isFromTo(this)">
        <button type="button" class="player__build-button" id="grid-build-button">Build</button>
      </div>
    </div>
    <div class="player__panel">
      <input id="hue-range-input" class="player__hue-range" type="range" min="0" max="360" step="1" oninput="colorRange()">
    </div>
    <div class="player__panel player__track-row">
      <audio id="spectrum-audio" class="player__audio" controls controlsList="nodownload" loop crossorigin="anonymous" draggable="false"></audio>
    </div>
  </div>
  <script src="js/analyser.js"></script>
</body>
</html>
